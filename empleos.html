<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolsa de Empleo | Mibanco</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
  <script src="./js/tailwind.js"></script>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
  <div id="navbar-placeholder"></div>

  <main class="flex-grow">
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
        <h2 class="text-xl font-bold text-gray-800 mb-6 font-helvetica">Filtrar empleos</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-2">Buscar</label>
            <input type="text" id="filtro-busqueda" placeholder="Titulo o palabras clave..."
              class="w-full px-4 py-2 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-mi-verde">
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-2">Distritos</label>
            <select id="filtro-distrito" class="w-full p-2 border border-gray-200 rounded-xl outline-none">
              <option value="Todos">Todos</option>
							<option value="Lima">Cercado de Lima</option>
							<option value="Miraflores">Miraflores</option>
							<option value="San Isidro">San Isidro</option>
							<option value="Los Olivos">Santiago de Surco</option>
							<option value="San Juan de Lurigancho">La Victoria</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-2">Modalidad</label>
            <select id="filtro-modalidad" class="w-full p-2 border border-gray-200 rounded-xl outline-none">
              <option value="Todas">Todas</option>
              <option value="Presencial">Presencial</option>
              <option value="Remoto">Remoto</option>
              <option value="Hibrido">Hibrido</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-600 mb-2">Experiencia</label>
            <select id="filtro-experiencia" class="w-full p-2 border border-gray-200 rounded-xl outline-none">
              <option value="Cualquiera">Cualquiera</option>
              <option value="Sin">Sin experiencia</option>
              <option value="Con">Con experiencia</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20">
      <div id="contenedor-empleos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>
  </main>

  <div id="modal-vacante" class="hidden fixed inset-0 z-[120] bg-black/60 backdrop-blur-sm p-4">
    <div class="max-w-3xl mx-auto h-full flex items-center justify-center">
      <div class="bg-white w-full rounded-3xl shadow-2xl overflow-hidden">
        <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100">
          <div>
            <p id="modal-vacante-tag" class="text-[11px] font-black uppercase text-mi-naranja mb-1"></p>
            <h3 id="modal-vacante-titulo" class="text-2xl font-bold text-gray-800 font-helvetica"></h3>
          </div>
          <button onclick="cerrarDetalleVacante()" class="text-gray-400 hover:text-gray-700 text-3xl leading-none">&times;</button>
        </div>

        <div class="p-6 md:p-8 max-h-[75vh] overflow-y-auto space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="bg-gray-50 rounded-2xl p-4">
              <p class="text-[11px] uppercase font-black text-gray-400">Modalidad</p>
              <p id="modal-vacante-modalidad" class="font-bold text-gray-700 mt-1"></p>
            </div>
            <div class="bg-gray-50 rounded-2xl p-4">
              <p class="text-[11px] uppercase font-black text-gray-400">Distrito</p>
              <p id="modal-vacante-distrito" class="font-bold text-gray-700 mt-1"></p>
            </div>
            <div class="bg-gray-50 rounded-2xl p-4">
              <p class="text-[11px] uppercase font-black text-gray-400">Experiencia</p>
              <p id="modal-vacante-experiencia" class="font-bold text-gray-700 mt-1"></p>
            </div>
          </div>

          <div>
            <h4 class="text-sm font-black uppercase text-gray-500 mb-2">Descripcion</h4>
            <p id="modal-vacante-descripcion" class="text-gray-600 leading-relaxed"></p>
          </div>

          <div>
            <h4 class="text-sm font-black uppercase text-gray-500 mb-2">Requisitos</h4>
            <ul id="modal-vacante-requisitos" class="space-y-2 text-sm text-gray-600 list-disc list-inside"></ul>
          </div>

          <div id="postulacion-estado" class="hidden rounded-2xl p-4 text-sm font-medium"></div>
        </div>

        <div class="px-6 py-5 border-t border-gray-100 flex flex-col sm:flex-row gap-3 justify-end">
          <button onclick="cerrarDetalleVacante()" class="px-6 py-3 rounded-xl font-bold text-gray-500 hover:text-gray-700">
            Cerrar
          </button>
          <button id="btn-confirmar-postulacion" class="bg-mi-verde text-white px-6 py-3 rounded-xl font-bold hover:bg-green-800 transition shadow-lg">
            Confirmar postulacion
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script type="module">
    import { db, auth, firebaseConfig } from './assets/firebase/config.js';
    import { initializeApp as initializeAiApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
    import { getAI, getGenerativeModel, VertexAIBackend } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-ai.js";
    import {
      collection,
      getDocs,
      query,
      where,
      doc,
      getDoc,
      addDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const contenedor = document.getElementById('contenedor-empleos');
    const estadoPostulacion = document.getElementById('postulacion-estado');
    const btnConfirmarPostulacion = document.getElementById('btn-confirmar-postulacion');
    let vacantesOriginales = [];
    let vacanteSeleccionada = null;
    const aiApp = initializeAiApp(firebaseConfig, 'match-ai');
    const ai = getAI(aiApp, { backend: new VertexAIBackend() });
    const matchJsonSchema = {
      type: "object",
      properties: {
        matchScores: {
          type: "object",
          properties: {
            exp: { type: "integer" },
            edu: { type: "integer" },
            idi: { type: "integer" },
            total: { type: "integer" }
          }
        },
        resumenIA: { type: "string" }
      }
    };
    const modeloMatchIA = getGenerativeModel(ai, {
      model: 'gemini-2.5-flash',
      generationConfig: {
        responseMimeType: "application/json",
        responseSchema: matchJsonSchema
      }
    });

    async function inicializarBolsa() {
      const ahora = new Date();
      const q = query(collection(db, "vacantes"), where("estado", "==", "abierta"));
      const snap = await getDocs(q);

      vacantesOriginales = snap.docs
        .map(docSnap => ({ id: docSnap.id, ...docSnap.data() }))
        .filter(v => {
          const inicio = v.fechaInicio?.toDate();
          const fin = v.fechaFin?.toDate();
          return inicio && fin && ahora >= inicio && ahora <= fin;
        });

      renderizarVacantes(vacantesOriginales);
      configurarEscuchadores();
    }

    function renderizarVacantes(lista) {
      contenedor.innerHTML = '';
      if (lista.length === 0) {
        contenedor.innerHTML = '<p class="col-span-full text-center text-gray-400 py-20 font-helvetica">No se encontraron empleos con esos filtros.</p>';
        return;
      }

      lista.forEach(v => {
        contenedor.innerHTML += `
          <div class="bg-white p-6 rounded-2xl shadow-md border-t-4 border-mi-verde hover:shadow-xl transition flex flex-col justify-between">
            <div>
              <div class="flex justify-between items-start mb-4">
                <span class="bg-green-100 text-mi-verde text-[10px] font-black px-3 py-1 rounded-full uppercase font-helvetica">
                  ${v.experiencia > 0 ? 'Con Exp.' : 'Primer Empleo'}
                </span>
                <span class="text-[10px] text-gray-400 font-bold uppercase font-helvetica">Cierre: ${v.fechaFin.toDate().toLocaleDateString()}</span>
              </div>
              <h3 class="text-xl font-bold text-gray-800 mb-2 capitalize">${v.titulo}</h3>
              <p class="text-gray-600 text-sm mb-4 line-clamp-3">${v.descripcion}</p>
              <div class="flex items-center text-xs text-gray-500 space-x-4 mb-6">
                <span><i class="fas fa-map-marker-alt text-mi-naranja"></i> ${v.modalidad === 'Remoto' ? 'Remoto' : v.distrito}</span>
                <span><i class="fas fa-briefcase text-mi-verde"></i> ${v.modalidad}</span>
              </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <button onclick="verDetalleVacante('${v.id}')" class="w-full border border-mi-verde text-mi-verde font-bold py-3 rounded-xl hover:bg-green-50 transition">
                Ver detalle
              </button>
              <button onclick="intentarPostular('${v.id}')" class="w-full bg-mi-verde text-white font-bold py-3 rounded-xl hover:bg-green-800 transition shadow-lg">
                Postular ahora
              </button>
            </div>
          </div>`;
      });
    }

    function configurarEscuchadores() {
      ['filtro-busqueda', 'filtro-distrito', 'filtro-modalidad', 'filtro-experiencia'].forEach(id => {
        document.getElementById(id).addEventListener('input', filtrarLocalmente);
      });
    }

    function filtrarLocalmente() {
      const busqueda = document.getElementById('filtro-busqueda').value.toLowerCase();
      const distrito = document.getElementById('filtro-distrito').value;
      const modalidad = document.getElementById('filtro-modalidad').value;
      const experiencia = document.getElementById('filtro-experiencia').value;

      const filtradas = vacantesOriginales.filter(v => {
        const coincideBusqueda = v.titulo.toLowerCase().includes(busqueda) || v.descripcion.toLowerCase().includes(busqueda);
        const coincideDistrito = distrito === 'Todos' || v.distrito === distrito;
        const coincideModalidad = modalidad === 'Todas' || v.modalidad === modalidad;
        const coincideExp = experiencia === 'Cualquiera' ||
          (experiencia === 'Sin' && v.experiencia === 0) ||
          (experiencia === 'Con' && v.experiencia > 0);

        return coincideBusqueda && coincideDistrito && coincideModalidad && coincideExp;
      });

      renderizarVacantes(filtradas);
    }

    function abrirDetalleVacante(vacante) {
      vacanteSeleccionada = vacante;
      document.getElementById('modal-vacante-tag').innerText = vacante.experiencia > 0 ? 'Con experiencia' : 'Primer empleo';
      document.getElementById('modal-vacante-titulo').innerText = vacante.titulo;
      document.getElementById('modal-vacante-modalidad').innerText = vacante.modalidad;
      document.getElementById('modal-vacante-distrito').innerText = vacante.modalidad === 'Remoto' ? 'Remoto' : (vacante.distrito || 'No especificado');
      document.getElementById('modal-vacante-experiencia').innerText = vacante.experiencia > 0 ? `${vacante.experiencia} meses` : 'No requerida';
      document.getElementById('modal-vacante-descripcion').innerText = vacante.descripcion || 'Sin descripcion.';
      document.getElementById('modal-vacante-requisitos').innerHTML = (vacante.requisitos || [])
        .map(req => `<li>${String(req).trim()}</li>`)
        .join('') || '<li>Sin requisitos registrados.</li>';

      estadoPostulacion.className = 'hidden rounded-2xl p-4 text-sm font-medium';
      estadoPostulacion.innerText = '';
      btnConfirmarPostulacion.disabled = false;
      btnConfirmarPostulacion.innerText = 'Confirmar postulacion';
      document.getElementById('modal-vacante').classList.remove('hidden');
    }

    window.verDetalleVacante = (idVacante) => {
      const vacante = vacantesOriginales.find(v => v.id === idVacante);
      if (vacante) abrirDetalleVacante(vacante);
    };

    window.intentarPostular = (idVacante) => {
      const vacante = vacantesOriginales.find(v => v.id === idVacante);
      if (vacante) abrirDetalleVacante(vacante);
    };

    window.cerrarDetalleVacante = () => {
      document.getElementById('modal-vacante').classList.add('hidden');
      vacanteSeleccionada = null;
    };

    btnConfirmarPostulacion.addEventListener('click', async () => {
      if (!vacanteSeleccionada) return;
      if (!auth.currentUser) {
        alert('Debes iniciar sesion para postular.');
        window.location.href = './login.html';
        return;
      }

      btnConfirmarPostulacion.disabled = true;
      btnConfirmarPostulacion.innerText = 'Postulando...';

      try {
        const user = auth.currentUser;
        const existe = await yaPostulo(user.uid, vacanteSeleccionada.id);
        if (existe) {
          mostrarEstadoPostulacion('Ya te postulaste a esta vacante.', 'warning');
          btnConfirmarPostulacion.disabled = false;
          btnConfirmarPostulacion.innerText = 'Confirmar postulacion';
          return;
        }

        const perfil = await construirPerfilPostulante(user.uid);
        const resultadoMatch = await calcularMatch(vacanteSeleccionada, perfil);

        await addDoc(collection(db, 'postulaciones'), {
          idVacante: vacanteSeleccionada.id,
          tituloVacante: vacanteSeleccionada.titulo,
          idPostulante: user.uid,
          nombre: perfil.nombre,
          email: perfil.email,
          telefono: perfil.telefono,
          cvNombre: perfil.cvNombre,
          cvUrl: perfil.cvUrl,
          fechaPostulacion: serverTimestamp(),
          estado: 'Postulada',
          matchScores: resultadoMatch.matchScores,
          resumenIA: resultadoMatch.resumenIA,
          perfilResumen: perfil.resumenTexto,
          requisitosSnapshot: vacanteSeleccionada.requisitos || []
        });

        mostrarEstadoPostulacion(`Postulacion enviada. Match estimado: ${resultadoMatch.matchScores.total}%`, 'success');
        btnConfirmarPostulacion.innerText = 'Postulacion enviada';
      } catch (error) {
        console.error('Error al postular:', error);
        mostrarEstadoPostulacion(error?.message || 'Ocurrio un error al registrar la postulacion.', 'error');
        btnConfirmarPostulacion.disabled = false;
        btnConfirmarPostulacion.innerText = 'Confirmar postulacion';
      }
    });

    async function yaPostulo(uid, idVacante) {
      const q = query(collection(db, 'postulaciones'), where('idPostulante', '==', uid), where('idVacante', '==', idVacante));
      const snap = await getDocs(q);
      return !snap.empty;
    }

    async function construirPerfilPostulante(uid) {
      const userSnap = await getDoc(doc(db, 'users', uid));
      const userData = userSnap.exists() ? userSnap.data() : {};

      const [experiencia, educacion, idiomas] = await Promise.all([
        leerSubcoleccion(uid, 'experiencia'),
        leerSubcoleccion(uid, 'educacion'),
        leerSubcoleccion(uid, 'idiomas')
      ]);

      const nombreCompleto = [userData.nombres, userData.apellidos].filter(Boolean).join(' ') || userData.nombres || 'Candidata';
      const resumenTexto = [
        `Nombre: ${nombreCompleto}`,
        `Distrito: ${userData.distrito || 'No especificado'}`,
        `Telefono: ${userData.telefono || 'No especificado'}`,
        `CV: ${userData.cvNombre || 'No cargado'}`,
        `Experiencia: ${experiencia.length ? experiencia.map(x => `${x.campo1} en ${x.campo2}`).join('; ') : 'Sin registros'}`,
        `Educacion: ${educacion.length ? educacion.map(x => `${x.campo1} - ${x.campo2}`).join('; ') : 'Sin registros'}`,
        `Idiomas: ${idiomas.length ? idiomas.map(x => `${x.campo1} (${x.campo2})`).join('; ') : 'Sin registros'}`
      ].join('\n');

      return {
        nombre: nombreCompleto,
        email: userData.email || auth.currentUser?.email || '-',
        telefono: userData.telefono || '-',
        cvNombre: userData.cvNombre || '',
        cvUrl: userData.cvUrl || '',
        cvGsUrl: userData.cvGsUrl || (userData.cvPath ? `gs://${firebaseConfig.storageBucket}/${userData.cvPath}` : ''),
        cvTipo: userData.cvTipo || 'application/pdf',
        cvTexto: await extraerTextoCV(userData.cvUrl || ''),
        resumenTexto,
        experiencia,
        educacion,
        idiomas
      };
    }

    async function leerSubcoleccion(uid, nombreColeccion) {
      const snap = await getDocs(collection(db, 'users', uid, nombreColeccion));
      return snap.docs.map(docSnap => docSnap.data());
    }

    function vacanteExigeIdiomas(vacante) {
      const textoVacante = [
        vacante.titulo || '',
        vacante.descripcion || '',
        ...(vacante.requisitos || [])
      ].join(' ').toLowerCase();

      const patronesIdioma = [
        'ingles',
        'inglés',
        'english',
        'portugues',
        'portugués',
        'frances',
        'francés',
        'italiano',
        'quechua',
        'nivel b1',
        'nivel b2',
        'nivel c1',
        'nivel c2',
        'idioma'
      ];

      return patronesIdioma.some(patron => textoVacante.includes(patron));
    }

    function sanitizarMatchRespuesta(data) {
      const scores = data?.matchScores || {};
      const clamp = value => Math.max(0, Math.min(100, Number(value) || 0));
      const exp = clamp(scores.exp);
      const edu = clamp(scores.edu);
      const idi = clamp(scores.idi);
      const promedio = Math.round((exp + edu + idi) / 3);
      const total = clamp(scores.total);

      if (!exp && !edu && !idi && !total) {
        throw new Error('La IA devolvio un match vacio o invalido.');
      }

      return {
        matchScores: {
          exp,
          edu,
          idi,
          total: total || promedio
        },
        resumenIA: String(data?.resumenIA || '').trim() || 'La IA no devolvio un resumen util.'
      };
    }

    async function calcularMatch(vacante, perfil) {
      const exigeIdiomas = vacanteExigeIdiomas(vacante);

      const prompt = `
Eres un asistente de reclutamiento para un concurso demo. Evalua el match entre una candidata y una vacante con criterio justo, explicable y conservador.
Devuelve SOLO JSON valido con esta forma:
{
  "matchScores": {
    "exp": 0,
    "edu": 0,
    "idi": 0,
    "total": 0
  },
  "resumenIA": "texto corto en espanol"
}

Vacante:
- Titulo: ${vacante.titulo}
- Modalidad: ${vacante.modalidad}
- Distrito: ${vacante.distrito || 'No especificado'}
- Experiencia requerida en meses: ${vacante.experiencia || 0}
- Descripcion: ${vacante.descripcion || 'Sin descripcion'}
- Requisitos: ${(vacante.requisitos || []).join(', ')}

Perfil de la candidata:
${perfil.resumenTexto}

Reglas:
- Usa enteros de 0 a 100.
- "exp" evalua experiencia, funciones relacionadas, seniority y herramientas usadas.
- "edu" evalua estudios, certificaciones y formacion relevante al puesto.
- "idi" evalua idiomas y comunicacion solo si el puesto realmente lo requiere o lo sugiere claramente.
- Si el puesto no exige idiomas (${exigeIdiomas ? 'si exige o sugiere idiomas' : 'no exige idiomas de forma explicita'}), no penalices por no tener idiomas registrados.
- Usa primero la evidencia del CV y luego complementa con el perfil estructurado.
- No inventes experiencia ni estudios que no aparezcan.
- Si falta informacion, baja el score con prudencia, no de forma extrema.
- "total" debe ser coherente con los tres puntajes y reflejar compatibilidad global con la vacante.
- El resumen debe ser breve, profesional y mencionar fortalezas y brechas si existen.
      `.trim();

      try {
        const partesPrompt = [prompt];

        if (perfil.cvGsUrl) {
          partesPrompt.push({
            fileData: {
              mimeType: perfil.cvTipo || 'application/pdf',
              fileUri: perfil.cvGsUrl
            }
          });
        } else if (perfil.cvTexto) {
          partesPrompt.push(`Texto extraido del CV:\n${perfil.cvTexto}`);
        }

        const result = await modeloMatchIA.generateContent(partesPrompt);
        const text = result.response.text() || '';
        const parsed = JSON.parse(text);
        return sanitizarMatchRespuesta(parsed);
      } catch (error) {
        console.error('Firebase AI Logic / Vertex AI fallo:', error);
        throw new Error(`No se pudo obtener un match valido desde la IA. ${error?.message || ''}`.trim());
      }
    }

    function mostrarEstadoPostulacion(mensaje, tipo) {
      estadoPostulacion.className = 'rounded-2xl p-4 text-sm font-medium';
      if (tipo === 'success') {
        estadoPostulacion.classList.add('bg-green-50', 'text-green-700');
      } else if (tipo === 'warning') {
        estadoPostulacion.classList.add('bg-yellow-50', 'text-yellow-700');
      } else {
        estadoPostulacion.classList.add('bg-red-50', 'text-red-700');
      }
      estadoPostulacion.innerText = mensaje;
      estadoPostulacion.classList.remove('hidden');
    }

    async function extraerTextoCV(cvUrl) {
      if (!cvUrl) return '';

      try {
        const pdfjsModule = await import('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs');
        pdfjsModule.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';

        const response = await fetch(cvUrl);
        if (!response.ok) return '';

        const pdfData = new Uint8Array(await response.arrayBuffer());
        const pdf = await pdfjsModule.getDocument({ data: pdfData }).promise;

        const maxPages = Math.min(pdf.numPages, 3);
        let texto = '';

        for (let pageNumber = 1; pageNumber <= maxPages; pageNumber += 1) {
          const page = await pdf.getPage(pageNumber);
          const content = await page.getTextContent();
          const pageText = content.items.map(item => item.str).join(' ');
          texto += ` ${pageText}`;
        }

        return texto.trim().slice(0, 12000);
      } catch (error) {
        console.warn('No se pudo extraer texto del CV:', error);
        return '';
      }
    }

    inicializarBolsa();
  </script>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
