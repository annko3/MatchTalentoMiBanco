<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <header></header>
    <main class="d-flex justify-content-center align-items-center vh-100">
      <div class="col-11 col-md-8 col-lg-5 col-xl-4 bg-amarillo rounded-5 p-5">

        <div id="paso1" class="d-grid gap-3 text-center">
          <button class="bg-naranja border-0 py-3 rounded-5 w-100 shadow-sm fw-bold">
            Continuar con Google
          </button>

          <div class="d-flex align-items-center justify-content-center my-2">
            <div
              class="flex-grow-1 border-bottom border-dark"
            ></div>
            <span class="mx-3">O</span>
            <div
              class="flex-grow-1 border-bottom border-dark"
            ></div>
          </div>

          <form action="" class="text-start">
            <label for="inputCorreo">Continua con tu correo</label>
            <input type="email" id="inputCorreo" class="form-control mt-3 py-3" />
          </form>

          <button onclick="cambiarAPaso2()" class="bg-rojo text-white fw-bold rounded-5 py-3 border-0 mt-4">
            Continuar
          </button>

          <p class="text-start">
            ¿Ya tienes una cuenta?
            <a href="#" class="text-rojo fw-bold text-decoration-none">Inicia sesión</a>
          </p>
        </div>


        <div id="paso2" class="d-none d-grid gap-3 text-center">
          <form action="">
            <label for="inputName">Nombres</label>
            <input type="text" id="inputName" class="form-control mt-3 py-3" />

            <label for="inputSurname">Apellidos</label>
            <input type="text" id="inputSurname" class="form-control mt-3 py-3" />

            <label for="inputEmail">Email</label>
            <input type="email" id="inputEmail" class="form-control mt-3 py-3" />
          </form>
        </div>

      </div>
    </main>
    <footer></footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./assets/js/userRegistration.js"></script>
  </body>
</html>
