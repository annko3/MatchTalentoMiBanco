<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - MatchTalento</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/userRegistration.css" />
  </head>
  <body>
    <main class="d-flex justify-content-center align-items-center vh-100">
      <div class="col-11 col-md-8 col-lg-5 col-xl-4 bg-amarillo rounded-5 p-5">
        <div id="paso1" class="d-grid gap-3 text-center">
          <button
            id="btn-google"
            class="bg-naranja border-0 py-3 rounded-5 w-100 fw-bold"
          >
            Continuar con Google
          </button>

          <div class="d-flex align-items-center justify-content-center my-2">
            <div class="flex-grow-1 border-bottom border-dark"></div>
            <span class="mx-3">O</span>
            <div class="flex-grow-1 border-bottom border-dark"></div>
          </div>

          <label for="inputEmail" class="text-start"
            >Continua con tu correo</label
          >
          <input
            type="email"
            id="inputEmail"
            class="form-control py-3 text-start"
          />
          <button
            onclick="validarYCambiarAPaso2()"
            class="btn-rojo fw-bold rounded-5 py-3 bg-rojo text-white border-0"
          >
            Continuar
          </button>
          <p class="text-start">
            ¿Ya tienes una cuenta?
            <a href="#" class="text-rojo fw-bold">Inicia sesión</a>
          </p>
        </div>

        <div id="paso2" class="d-none d-grid gap-3">
          <h4 class="text-dark fw-bold text-center">
            Empieza a crear tu cuenta
          </h4>

          <label for="inputName">Nombres *</label>
          <input type="text" id="inputName" class="form-control py-3" />

          <label for="inputSurname">Apellidos *</label>
          <input type="text" id="inputSurname" class="form-control py-3" />

          <label for="inputEmail2">Email *</label>
          <input
            type="email"
            id="inputEmail2"
            class="form-control py-3"
            readonly
            style="background-color: #e9ecef"
          />

          <label for="inputPassword">Contraseña *</label>
          <input
            type="password"
            id="inputPassword"
            class="form-control py-3"
            autocomplete="new-password"
          />

          <label for="inputConfirmPassword">Confirmar Contraseña *</label>
          <input
            type="password"
            id="inputConfirmPassword"
            class="form-control py-3"
            autocomplete="new-password"
          />

          <label for="inputLocation">Ubicacion *</label>
          <div class="row g-2">
            <div class="col-6">
              <select id="selectDepartamento" class="form-select py-3">
                <option value="" disabled selected>Departamento</option>
              </select>
            </div>
            <div class="col-6">
              <select id="selectDistrito" class="form-select py-3">
                <option value="" disabled selected>Distrito</option>
              </select>
            </div>
          </div>
          <button
            onclick="validarYCambiarAPaso3()"
            class="btn-rojo fw-bold rounded-5 py-3 bg-rojo text-white border-0"
          >
            Continuar
          </button>
        </div>

        <div id="paso3" class="d-none d-grid gap-3">
          <h4 class="text-dark fw-bold text-center">Datos personales</h4>

          <label for="inputBirthDate">Fecha de nacimiento *</label>
          <input type="date" id="inputBirthDate" class="form-control py-3" />

          <label>Identificación *</label>
          <div class="row g-4">
            <div class="col-4">
              <select id="inputIdType" class="form-select py-3 col-2">
                <option value="" disabled selected>Selecciona</option>
                <option value="dni">DNI</option>
                <option value="pasaporte">Pasaporte</option>
              </select>
            </div>

            <div class="col-8">
              <input
                type="text"
                id="inputIdNumber"
                class="form-control py-3 col-4"
              />
            </div>
          </div>

          <label for="inputPhone">Teléfono *</label>
          <input type="text" id="inputPhone" class="form-control py-3" />

          <button
            onclick="validarYCambiarAPaso4()"
            class="btn-rojo fw-bold rounded-5 py-3 bg-rojo text-white border-0"
          >
            Continuar
          </button>
        </div>

        <div id="paso4" class="d-none d-grid gap-3">
          <h4 class="text-dark fw-bold text-center">Formación</h4>

          <label for="inputInstitution">Institución Educativa *</label>
          <input type="text" id="inputInstitution" class="form-control py-3" />

          <label for="inputDegree">Título Obtenido *</label>
          <input type="text" id="inputDegree" class="form-control py-3" />

          <label for="inputStatus">Estado</label>
          <div class="btn-group w-100 gap-4" role="group">
            <input
              type="radio"
              class="btn-check"
              name="estado"
              id="estadoCursando"
              value="cursando"
              autocomplete="off"
              checked
            />
            <label class="btn bg-white border-0 py-3" for="estadoCursando"
              >Cursando</label
            >

            <input
              type="radio"
              class="btn-check"
              name="estado"
              id="estadoPausado"
              value="pausado"
              autocomplete="off"
            />
            <label class="btn bg-white border-0 py-3" for="estadoPausado"
              >Pausado</label
            >

            <input
              type="radio"
              class="btn-check"
              name="estado"
              id="estadoFinalizado"
              value="finalizado"
              autocomplete="off"
            />
            <label class="btn bg-white border-0 py-3" for="estadoFinalizado"
              >Finalizado</label
            >
          </div>

          <label class="form-label">Desde</label>
          <div class="row g-4">
            <div class="col-6">
              <select id="inputMesInicio" class="form-select py-3">
                <option value="" disabled selected>Mes</option>
                <option value="1">Enero</option>
                <option value="2">Febrero</option>
                <option value="3">Marzo</option>
                <option value="4">Abril</option>
                <option value="5">Mayo</option>
                <option value="6">Junio</option>
                <option value="7">Julio</option>
                <option value="8">Agosto</option>
                <option value="9">Septiembre</option>
                <option value="10">Octubre</option>
                <option value="11">Noviembre</option>
                <option value="12">Diciembre</option>
              </select>
            </div>
            <div class="col-6">
              <select id="inputAnioInicio" class="form-select py-3">
                <option value="" disabled selected>Año</option>
                <option value="2020">2020</option>
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
              </select>
            </div>
          </div>

          <label class="form-label">Hasta</label>
          <div class="row g-4">
            <div class="col-6">
              <select id="inputMesFin" class="form-select py-3">
                <option value="" disabled selected>Mes</option>
                <option value="1">Enero</option>
                <option value="2">Febrero</option>
                <option value="3">Marzo</option>
                <option value="4">Abril</option>
                <option value="5">Mayo</option>
                <option value="6">Junio</option>
                <option value="7">Julio</option>
                <option value="8">Agosto</option>
                <option value="9">Septiembre</option>
                <option value="10">Octubre</option>
                <option value="11">Noviembre</option>
                <option value="12">Diciembre</option>
              </select>
            </div>
            <div class="col-6">
              <select id="inputAnioFin" class="form-select py-3">
                <option value="" disabled selected>Año</option>
                <option value="2020">2020</option>
                <option value="2021">2021</option>
                <option value="2022">2022</option>
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026">2026</option>
              </select>
            </div>
          </div>

          <label for="">Contenido multimedia (Opcional)</label>
          <input
            type="file"
            id="inputArchivos"
            multiple
            accept="image/*,application/pdf,video/*"
            class="d-none"
          />

          <button
            type="button"
            id="btnSeleccionarArchivos"
            class="btn-celeste fw-bold rounded-3 py-3 bg-celeste text-white border-0"
          >
            + Añadir contenido multimedia
          </button>
          <div id="listaArchivos" class="mt-3"></div>

          <button
            onclick="añadirFormacion()"
            class="btn-rojo fw-bold rounded-5 py-3 bg-rojo text-white border-0"
          >
            Añadir
          </button>
        </div>

        <div id="paso5" class="d-none d-grid gap-3">
          <h4 class="text-black fw-bold text-center">Formación</h4>
          <h5 class="text-black fw-bold text-start">EDUCACION</h5>

          <div id="listaFormacionesContainer"></div>
          <div id="multimediaContainer" class="mt-3"></div>

          <button
            onclick="volverAFormulario()"
            class="btn-naranja fw-bold rounded-5 py-3 bg-transparent text-celeste border-0"
          >
            + Añadir nueva formación
          </button>

          <button
            onclick="validarYCambiarAPaso6()"
            class="btn-rojo fw-bold rounded-5 py-3 bg-rojo text-white border-0"
          >
            Continuar
          </button>
        </div>

        <div id="paso6" class="d-none d-grid gap-3">
          <h4 class="text-dark fw-bold text-center">Experiencia profesional</h4>

          <button
            onclick="saltarExperiencia()"
            class="btn-celeste fw-bold rounded-5 py-3 bg-celeste text-white border-0"
          >
            Estoy buscando mi primer empleo
          </button>

          <div class="d-flex align-items-center justify-content-center my-2">
            <div class="flex-grow-1 border-bottom border-dark"></div>
            <span class="mx-3">O</span>
            <div class="flex-grow-1 border-bottom border-dark"></div>
          </div>

          <label for="inputCargo">Cargo *</label>
          <input
            type="text"
            id="inputCargo"
            class="form-control py-3"
            placeholder="Ej. Atención al cliente"
          />

          <label for="inputEmpresa">Empresa *</label>
          <input
            type="text"
            id="inputEmpresa"
            class="form-control py-3"
            placeholder="Ej. Empresa SAC"
          />

          <label class="form-label">Desde</label>
          <div class="row g-4">
            <div class="col-6">
              <select id="inputExpMesInicio" class="form-select py-3">
                <option value="" disabled selected>Mes</option>
                <option value="1">Enero</option>
                <option value="2">Febrero</option>
                <option value="3">Marzo</option>
                <option value="4">Abril</option>
                <option value="5">Mayo</option>
                <option value="6">Junio</option>
                <option value="7">Julio</option>
                <option value="8">Agosto</option>
                <option value="9">Septiembre</option>
                <option value="10">Octubre</option>
                <option value="11">Noviembre</option>
                <option value="12">Diciembre</option>
              </select>
            </div>
            <div class="col-6">
              <select id="inputExpAnioInicio" class="form-select py-3">
                <option value="" disabled selected>Año</option>
              </select>
            </div>
          </div>

          <label class="form-label">Hasta</label>
          <div class="row g-4">
            <div class="col-6">
              <select id="inputExpMesFin" class="form-select py-3">
                <option value="" disabled selected>Mes</option>
                <option value="1">Enero</option>
                <option value="2">Febrero</option>
                <option value="3">Marzo</option>
                <option value="4">Abril</option>
                <option value="5">Mayo</option>
                <option value="6">Junio</option>
                <option value="7">Julio</option>
                <option value="8">Agosto</option>
                <option value="9">Septiembre</option>
                <option value="10">Octubre</option>
                <option value="11">Noviembre</option>
                <option value="12">Diciembre</option>
              </select>
            </div>
            <div class="col-6">
              <select id="inputExpAnioFin" class="form-select py-3">
                <option value="" disabled selected>Año</option>
              </select>
            </div>
          </div>

          <label for="inputExpDescripcion">Descripción (Opcional)</label>
          <textarea
            id="inputExpDescripcion"
            class="form-control py-3"
            rows="3"
            placeholder="Describe tus responsabilidades y logros..."
          ></textarea>

          <button
            onclick="añadirExperiencia()"
            class="btn-rojo fw-bold rounded-5 py-3 bg-rojo text-white border-0"
          >
            Añadir experiencia
          </button>
        </div>

        <div id="paso7" class="d-none d-grid gap-3">
          <h4 class="text-dark fw-bold text-center">Experiencia profesional</h4>
          <h5 class="text-black fw-bold text-start">EXPERIENCIA LABORAL</h5>

          <div id="listaExperienciasContainer"></div>

          <button
            onclick="volverAFormularioExperiencia()"
            class="btn-naranja fw-bold rounded-5 py-3 bg-transparent text-celeste border-0"
          >
            + Añadir nueva experiencia
          </button>

          <button
            onclick="finalizarRegistro()"
            class="btn-rojo fw-bold rounded-5 py-3 bg-rojo text-white border-0"
          >
            Finalizar registro
          </button>
        </div>
      </div>
    </main>

    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
      <div id="liveToast" class="toast" role="alert">
        <div class="toast-header">
          <strong class="me-auto" id="toastTitle">Notificación</strong>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="toast"
          ></button>
        </div>
        <div class="toast-body" id="toastBody">Mensaje</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./assets/js/userRegistration.js"></script>
  </body>
</html>
