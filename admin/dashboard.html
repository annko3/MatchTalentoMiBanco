<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<title>Progreso | Admin Mibanco</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
	<script src="/js/tailwind.js"></script>
</head>

<body class="bg-slate-100 flex min-h-screen">

	<!--  SIDEBAR -->
	<div id="sidebar-placeholder"></div>

	<!-- CONTENIDO -->
	<main class="ml-72 flex-1 p-10">
		<div class="bg-[#f2f2f2] p-8 rounded-xl shadow-lg border border-gray-200 mt-10">
			<div class="bg-mi-verde text-white text-center py-3 rounded-t-xl font-bold text-xl mb-4 shadow-md">
				Lista de progreso
			</div>

			<table class="w-full text-center border-separate border-spacing-y-2">
				<thead>
					<tr class="bg-mi-amarillo text-gray-800 font-bold uppercase text-sm">
						<th class="py-4 rounded-l-lg border-r border-gray-300">Puesto</th>
						<th class="py-4 border-r border-gray-300">Postulantes</th>
						<th class="py-4 border-r border-gray-300">Entrevista</th>
						<th class="py-4 border-r border-gray-300">Fecha de fin</th>
						<th class="py-4 border-r border-gray-300">Estado</th>
						<th class="py-4 rounded-r-lg">More</th>
					</tr>
				</thead>
				<tbody id="tabla-progreso"></tbody>
			</table>
		</div>
	</main>

	<script type="module">
		import { cargarSidebarAdmin } from '../js/main.js';
		import { auth, db } from '../assets/firebase/config.js';
		import { doc, getDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
		import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

		/* ================= SIDEBAR + AUTH ================= */
		await cargarSidebarAdmin();

		auth.onAuthStateChanged(async (user) => {
			if (user) {
				const snap = await getDoc(doc(db, "users", user.uid));

				if (snap.exists()) {
					const d = snap.data();

					document.getElementById('admin-nombre-side').innerText = d.nombres || "Admin";
					document.getElementById('admin-puesto-side').innerText =
						`${d.puesto || 'Puesto'} (${d.codigo || '000'})`;

					if (d.fotoUrl) {
						document.getElementById('admin-foto-side').src = d.fotoUrl;
					}
				}

				// Logout del sidebar dinámico
				document.getElementById('btn-logout')
					.addEventListener('click', () => signOut(auth));

			} else {
				window.location.href = '../index.html';
			}
		});

		/* PROGRESO */
		async function cargar() {
			const ahora = new Date(); // Capturamos el "hoy" (17 de abril)
			const snapV = await getDocs(collection(db, "vacantes"));
			const snapP = await getDocs(collection(db, "postulaciones"));
			const tbody = document.getElementById('tabla-progreso');
			tbody.innerHTML = "";

			snapV.forEach(vDoc => {
				const v = vDoc.data();
				const total = snapP.docs.filter(p => p.data().idVacante === vDoc.id).length;

				// --- LÓGICA DE ESTADO DINÁMICO ---
				const inicio = v.fechaInicio?.toDate();
				const fin = v.fechaFin?.toDate();

				let estadoTexto = "Desconocido";
				let estiloClase = "bg-gray-100 text-gray-400"; // Gris por defecto

				if (ahora < inicio) {
					estadoTexto = "Pendiente";
					estiloClase = "bg-blue-100 text-blue-600"; // Azul para lo que viene
				} else if (ahora >= inicio && ahora <= fin) {
					estadoTexto = "Abierto";
					estiloClase = "bg-green-100 text-mi-verde"; // Verde Mibanco para lo activo
				} else if (ahora > fin) {
					estadoTexto = "Cerrado";
					estiloClase = "bg-red-100 text-mi-rojo"; // Rojo para lo vencido
				}

				tbody.innerHTML += `
            <tr class="bg-white shadow-sm hover:scale-[1.01] transition-transform">
                <td class="py-4 font-bold italic border-r border-gray-100">${v.titulo}</td>
                <td class="py-4 border-r border-gray-100">${total}</td>
                <td class="py-4 border-r border-gray-100 text-mi-naranja font-bold">0</td>
                <td class="py-4 border-r border-gray-100">
                    <span class="text-[10px] font-bold text-gray-400">${fin ? fin.toLocaleDateString() : '-'}</span>
                </td>
                <td class="py-4 border-r border-gray-100">
                    <span class="${estiloClase} px-3 py-1 rounded-full text-xs font-bold uppercase">
                        ${estadoTexto}
                    </span>
                </td>
                <td class="py-4">
                    <i onclick="window.location.href='detalle-vacante.html?id=${vDoc.id}'"
                       class='bx bxs-plus-square text-mi-naranja text-3xl cursor-pointer'></i>
                </td>
            </tr>`;
			});
		}
		cargar();
	</script>

</body>

</html>
