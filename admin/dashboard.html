<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Progreso | Admin Mibanco</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
	<script src="/js/tailwind.js"></script>
</head>

<body class="bg-slate-100 flex min-h-screen">
	<div id="sidebar-placeholder"></div>

	<main class="ml-0 lg:ml-72 flex-1 p-4 md:p-8 lg:p-10">
		<div class="bg-[#f2f2f2] p-6 md:p-8 rounded-xl shadow-lg border border-gray-200 mt-6 lg:mt-10">
			<div class="bg-mi-verde text-white text-center py-3 rounded-t-xl font-bold text-xl mb-4 shadow-md">
				Lista de progreso
			</div>

			<div class="overflow-x-auto">
				<table class="w-full text-center border-separate border-spacing-y-2 min-w-[760px]">
					<thead>
						<tr class="bg-mi-amarillo text-gray-800 font-bold uppercase text-sm">
							<th class="py-4 rounded-l-lg border-r border-gray-300">Puesto</th>
							<th class="py-4 border-r border-gray-300">Postulantes</th>
							<th class="py-4 border-r border-gray-300">Entrevista</th>
							<th class="py-4 border-r border-gray-300">Fecha de fin</th>
							<th class="py-4 border-r border-gray-300">Estado</th>
							<th class="py-4 rounded-r-lg">More</th>
						</tr>
					</thead>
					<tbody id="tabla-progreso"></tbody>
				</table>
			</div>
		</div>
	</main>

	<script type="module">
		import { cargarSidebarAdmin } from '../js/main.js';
		import { auth, db } from '../assets/firebase/config.js';
		import { doc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
		import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

		await cargarSidebarAdmin();

		let vacantesDocs = [];
		let postulacionesDocs = [];

		auth.onAuthStateChanged(async (user) => {
			if (!user) {
				window.location.href = '../index.html';
				return;
			}

			const snap = await getDoc(doc(db, "users", user.uid));
			if (snap.exists()) {
				const d = snap.data();
				document.getElementById('admin-nombre-side').innerText = d.nombres || "Admin";
				document.getElementById('admin-puesto-side').innerText = `${d.puesto || 'Puesto'} (${d.codigo || '000'})`;

				if (d.fotoUrl) {
					document.getElementById('admin-foto-side').src = d.fotoUrl;
				}
			}

			document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));
			cargar();
		});

		function contarEntrevistas(idVacante) {
			return postulacionesDocs.filter((postulacionDoc) => {
				const postulacion = postulacionDoc.data();
				return postulacion.idVacante === idVacante && String(postulacion.estado || '').toLowerCase().includes('entrevista');
			}).length;
		}

		function renderTabla() {
			const ahora = new Date();
			const tbody = document.getElementById('tabla-progreso');
			tbody.innerHTML = "";

			vacantesDocs.forEach((vDoc) => {
				const vacante = vDoc.data();
				const total = postulacionesDocs.filter((p) => p.data().idVacante === vDoc.id).length;
				const entrevistas = contarEntrevistas(vDoc.id);
				const inicio = vacante.fechaInicio?.toDate();
				const fin = vacante.fechaFin?.toDate();

				let estadoTexto = "Desconocido";
				let estiloClase = "bg-gray-100 text-gray-400";

				if (inicio && ahora < inicio) {
					estadoTexto = "Pendiente";
					estiloClase = "bg-blue-100 text-blue-600";
				} else if (inicio && fin && ahora >= inicio && ahora <= fin) {
					estadoTexto = "Abierto";
					estiloClase = "bg-green-100 text-mi-verde";
				} else if (fin && ahora > fin) {
					estadoTexto = "Cerrado";
					estiloClase = "bg-red-100 text-mi-rojo";
				}

				tbody.innerHTML += `
					<tr class="bg-white shadow-sm hover:scale-[1.01] transition-transform">
						<td class="py-4 font-bold font-helvetica border-r border-gray-100">${vacante.titulo}</td>
						<td class="py-4 border-r border-gray-100">${total}</td>
						<td class="py-4 border-r border-gray-100 text-mi-verde font-bold">${entrevistas}</td>
						<td class="py-4 border-r border-gray-100">
							<span class="text-[10px] font-bold text-gray-400">${fin ? fin.toLocaleDateString() : '-'}</span>
						</td>
						<td class="py-4 border-r border-gray-100">
							<span class="${estiloClase} px-3 py-1 rounded-full text-xs font-bold uppercase">
								${estadoTexto}
							</span>
						</td>
						<td class="py-4">
							<i onclick="window.location.href='detalle-vacante.html?id=${vDoc.id}'"
								class='bx bxs-plus-square text-mi-naranja text-3xl cursor-pointer'></i>
						</td>
					</tr>`;
			});
		}

		function cargar() {
			onSnapshot(collection(db, "vacantes"), (snap) => {
				vacantesDocs = snap.docs;
				renderTabla();
			});

			onSnapshot(collection(db, "postulaciones"), (snap) => {
				postulacionesDocs = snap.docs;
				renderTabla();
			});
		}
	</script>

</body>

</html>
