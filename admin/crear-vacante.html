<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Vacante | Mibanco</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
	<script src="/js/tailwind.js"></script>
</head>

<body class="bg-slate-50 flex min-h-screen">
	<div id="sidebar-placeholder"></div>

	<main class="ml-0 lg:ml-72 flex-1 p-4 md:p-8 lg:p-10">
		<div class="max-w-4xl mx-auto">
			<div class="flex items-center justify-between mb-8">
				<h1 id="titulo-formulario" class="text-3xl font-bold text-gray-800 font-helvetica">Nueva Vacante</h1>
				<a href="vacantes.html" class="text-gray-400 hover:text-mi-verde">
					<i class='bx bx-arrow-back'></i> Volver
				</a>
			</div>

			<form id="form-vacante" class="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-gray-100 grid grid-cols-1 md:grid-cols-2 gap-6">
				<div class="md:col-span-2">
					<label class="block text-sm font-bold text-gray-700 mb-2 font-helvetica">Titulo del puesto *</label>
					<input type="text" id="titulo"
						class="w-full bg-gray-50 border-none p-4 rounded-2xl focus:ring-2 focus:ring-mi-verde outline-none"
						placeholder="Ej. Analista de Creditos Junior" required>
				</div>

				<div>
					<label class="block text-sm font-bold text-gray-700 mb-2 font-helvetica">Modalidad *</label>
					<select id="modalidad" class="w-full bg-gray-50 border-none p-4 rounded-2xl outline-none">
						<option value="Presencial">Presencial</option>
						<option value="Remoto">Remoto</option>
						<option value="Hibrido">Hibrido</option>
					</select>
				</div>

				<div>
					<label class="block text-sm font-bold text-gray-700 mb-2 font-helvetica">Distrito</label>
					<select id="distrito" class="w-full bg-gray-50 border-none p-4 rounded-2xl outline-none">
						<option value="Cercado de Lima">Cercado de Lima</option>
						<option value="Miraflores">Miraflores</option>
						<option value="San Isidro">San Isidro</option>
						<option value="Santiago de Surco">Santiago de Surco</option>
						<option value="La Victoria">La Victoria</option>
					</select>
				</div>

				<div>
					<label class="block text-sm font-bold text-gray-700 mb-2 font-helvetica">Experiencia requerida (meses)</label>
					<input type="number" id="experiencia" class="w-full bg-gray-50 border-none p-4 rounded-2xl outline-none"
						placeholder="Ej. 6" value="0" min="0">
				</div>

				<div class="grid grid-cols-2 gap-6">
					<div>
						<label class="block text-sm font-bold text-gray-700 mb-2 font-helvetica">Fecha de inicio *</label>
						<input type="date" id="fechaInicio"
							class="w-full bg-gray-50 border-none p-4 rounded-2xl focus:ring-2 focus:ring-mi-verde outline-none"
							required>
					</div>
					<div>
						<label class="block text-sm font-bold text-gray-700 mb-2 font-helvetica">Fecha de cierre *</label>
						<input type="date" id="fechaFin"
							class="w-full bg-gray-50 border-none p-4 rounded-2xl focus:ring-2 focus:ring-mi-verde outline-none"
							required>
					</div>
				</div>

				<div class="md:col-span-2">
					<label class="block text-sm font-bold text-gray-700 mb-2 font-helvetica">Descripcion detallada</label>
					<textarea id="descripcion" class="w-full bg-gray-50 border-none p-4 rounded-2xl outline-none h-32"
						placeholder="Describe las responsabilidades..."></textarea>
				</div>

				<div class="md:col-span-2">
					<label class="block text-sm font-bold text-gray-700 mb-2 font-helvetica">Requisitos (separados por comas)</label>
					<input type="text" id="requisitos" class="w-full bg-gray-50 border-none p-4 rounded-2xl outline-none"
						placeholder="Excel, Atencion al cliente, Contabilidad">
				</div>

				<button id="btn-submit" type="submit"
					class="md:col-span-2 bg-mi-verde text-white py-4 rounded-2xl font-bold text-lg shadow-lg hover:bg-green-700 transition">
					Publicar ahora en Mibanco
				</button>
			</form>
		</div>
	</main>

	<script type="module">
		import { cargarSidebarAdmin } from '../js/main.js';
		import { auth, db } from '../assets/firebase/config.js';
		import { doc, getDoc, collection, addDoc, updateDoc, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
		import { signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

		await cargarSidebarAdmin();

		const params = new URLSearchParams(window.location.search);
		const idVacante = params.get('id');
		const esEdicion = Boolean(idVacante);

		auth.onAuthStateChanged(async (user) => {
			if (user) {
				const snap = await getDoc(doc(db, "users", user.uid));

				if (snap.exists()) {
					const d = snap.data();

					document.getElementById('admin-nombre-side').innerText = d.nombres || "Admin";
					document.getElementById('admin-puesto-side').innerText =
						`${d.puesto || 'Puesto'} (${d.codigo || '000'})`;

					if (d.fotoUrl) {
						document.getElementById('admin-foto-side').src = d.fotoUrl;
					}
				}

				document.getElementById('btn-logout')
					.addEventListener('click', () => signOut(auth));

				if (esEdicion) {
					await cargarVacanteExistente();
				}
			} else {
				window.location.href = '../index.html';
			}
		});

		function toInputDate(timestamp) {
			if (!timestamp?.toDate) return "";
			return timestamp.toDate().toISOString().split("T")[0];
		}

		async function cargarVacanteExistente() {
			const snap = await getDoc(doc(db, "vacantes", idVacante));
			if (!snap.exists()) return;

			const vacante = snap.data();
			document.getElementById("titulo-formulario").innerText = "Editar Vacante";
			document.getElementById("btn-submit").innerText = "Guardar cambios";
			document.getElementById("titulo").value = vacante.titulo || "";
			document.getElementById("modalidad").value = vacante.modalidad || "Presencial";
			document.getElementById("distrito").value = vacante.distrito || "Cercado de Lima";
			document.getElementById("experiencia").value = vacante.experiencia || 0;
			document.getElementById("fechaInicio").value = toInputDate(vacante.fechaInicio);
			document.getElementById("fechaFin").value = toInputDate(vacante.fechaFin);
			document.getElementById("descripcion").value = vacante.descripcion || "";
			document.getElementById("requisitos").value = (vacante.requisitos || []).join(', ');
		}

		document.getElementById('form-vacante').addEventListener('submit', async (e) => {
			e.preventDefault();

			const datos = {
				titulo: document.getElementById('titulo').value,
				modalidad: document.getElementById('modalidad').value,
				distrito: document.getElementById('distrito').value,
				experiencia: parseInt(document.getElementById('experiencia').value || "0", 10),
				descripcion: document.getElementById('descripcion').value,
				requisitos: document.getElementById('requisitos').value
					.split(',')
					.map((item) => item.trim())
					.filter(Boolean),
				fechaInicio: Timestamp.fromDate(new Date(document.getElementById('fechaInicio').value + "T00:00:00")),
				fechaFin: Timestamp.fromDate(new Date(document.getElementById('fechaFin').value + "T23:59:59")),
				estado: "abierta"
			};

			try {
				if (esEdicion) {
					await updateDoc(doc(db, "vacantes", idVacante), datos);
					alert("Vacante actualizada correctamente.");
				} else {
					await addDoc(collection(db, "vacantes"), {
						...datos,
						fechaPublicacion: Timestamp.now()
					});
					alert("Vacante publicada. Ya es visible para las candidatas.");
				}

				window.location.href = "vacantes.html";
			} catch (error) {
				console.error("Error al guardar:", error);
				alert("No se pudo guardar la vacante.");
			}
		});
	</script>

</body>

</html>
