<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingresar | Match Talento</title>
    <script src="https://cdn.tailwindcss.com"></script>
		<script src="./js/tailwind.js"></script>
</head>
<body class="bg-mi-verde h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-3xl shadow-xl w-full max-w-md border border-gray-100">
        <div class="text-center mb-8">
            <img src="./img/logo.png" alt="Mibanco" class="h-12 mx-auto mb-4">
            <h2 class="text-2xl font-bold text-gray-800">¡Bienvenida de nuevo!</h2>
            <p class="text-gray-500">Ingresa para continuar con tu proceso.</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Correo electrónico</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-mi-verde outline-none" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Contraseña</label>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-mi-verde outline-none" required>
            </div>
            <button type="submit" class="w-full bg-mi-verde text-white py-4 rounded-xl font-bold text-lg hover:bg-green-800 transition shadow-lg">
                Iniciar Sesión
            </button>
        </form>

        <p class="text-center mt-8 text-gray-600">
            ¿No tienes cuenta? <a href="userRegistration.html" class="text-mi-naranja font-bold">Regístrate aquí</a>
        </p>
    </div>

    <script type="module">
        import { auth, db, signInWithEmailAndPassword, doc, getDoc } from './assets/firebase/config.js';

        const loginForm = document.getElementById('login-form');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // REVISAR ROL EN FIRESTORE
                const userSnap = await getDoc(doc(db, "users", user.uid));
                
                if (userSnap.exists()) {
                    const rol = userSnap.data().rol;
                    if (rol === 'admin') {
                        window.location.href = './admin/vacantes.html';
                    } else {
                        window.location.href = 'empleos.html';
                    }
                }
            } catch (error) {
                alert("Error: Usuario o contraseña incorrectos.");
            }
        });
    </script>
</body>
</html>
